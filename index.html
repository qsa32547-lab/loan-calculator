<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初步試算轉貸銀行可節省金額</title>
    <style>
        body { font-family: "Microsoft JhengHei", Arial, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { background-color: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); max-width: 450px; width: 100%; box-sizing: border-box; }
        h2 { text-align: center; color: #2c3e50; font-size: 20px; margin-bottom: 20px; }
        .tab-container { display: flex; width: 100%; margin-bottom: 15px; border-bottom: 2px solid #ddd; }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; font-weight: bold; color: #7f8c8d; background: #f9f9f9; border: 1px solid #ddd; border-bottom: none; border-radius: 8px 8px 0 0; }
        .tab.active { color: #27ae60; background: #fff; border-bottom: 2px solid #fff; margin-bottom: -2px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button.calc-btn { width: 100%; padding: 12px; background-color: #27ae60; color: white; border: none; border-radius: 6px; font-size: 17px; font-weight: bold; cursor: pointer; }
        .result-wrapper { display: none; margin-top: 20px; }
        .result-box { padding: 15px; border-radius: 8px; background-color: #e8f8f5; border-left: 5px solid #2cc990; }
        .result-item { margin-bottom: 10px; font-size: 15px; }
        .highlight { font-weight: bold; color: #e74c3c; font-size: 17px; }
        .contact-section { margin-top: 15px; padding-top: 15px; border-top: 2px dashed #2cc990; }
        .contact-title { font-weight: bold; text-align: center; margin-bottom: 10px; font-size: 15px; }
        .input-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .submit-btn { width: 100%; padding: 12px; background-color: #06C755; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .footer-link { width: 100%; display: block; text-align: center; font-size: 15px; font-weight: bold; color: #27ae60; margin-top: 8px; padding: 12px; border: 1px solid #27ae60; border-radius: 6px; background: white; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>初步試算轉貸銀行可節省金額</h2>
    <div class="tab-container">
        <div class="tab active" id="tabA" onclick="switchTab('A')">民間純繳息</div>
        <div class="tab" id="tabB" onclick="switchTab('B')">融資本利攤還</div>
    </div>
    
    <div class="form-group"><label>目前民間借款總金額 (萬元)：</label><input type="number" id="loanAmount" placeholder="例如：100"></div>
    <div class="form-group"><label>目前每月支出 (元)：</label><input type="number" id="currentMonthlyPay" placeholder="例如：20000"></div>
    
    <button class="calc-btn" onclick="calculateSavings()">開始進行試算</button>
    
    <div class="result-wrapper" id="resultWrapper">
        <div class="result-box">
            <div class="result-item">銀行預估每月還款：<span id="bankMonthlyPay" style="font-weight: bold;">0</span> 元</div>
            <div class="result-item">整合後每月省下：<span id="monthlySavings" class="highlight">0</span> 元</div>
            
            <div class="contact-section">
                <div class="contact-title">✨ 獲取免費諮詢與規劃 ✨</div>
                <div class="input-row">
                    <input type="text" id="clientName" placeholder="您的姓氏">
                    <input type="tel" id="clientPhone" placeholder="聯繫電話">
                </div>
                <button class="submit-btn" onclick="submitAndAction('NONE')">送出並登記初步試算資料</button>
                <button class="footer-link" onclick="submitAndAction('LINE')">點擊加 LINE 了解詳情</button>
                <button class="footer-link" style="color: #06C755; border-color: #06C755;" onclick="submitAndAction('PHONE')">電話聯繫：0905-357761</button>
            </div>
        </div>
    </div>
</div>

<iframe name="silent_backdoor_frame" id="silent_backdoor_frame" style="display:none;"></iframe>

<script>
var currentType = 'A', globalSavingsMonth = 0, globalAmountWan = 0;

function switchTab(type) {
    currentType = type;
    document.getElementById('resultWrapper').style.display = 'none';
    document.getElementById('tabA').className = type === 'A' ? 'tab active' : 'tab';
    document.getElementById('tabB').className = type === 'B' ? 'tab active' : 'tab';
}

function calculateSavings() {
    globalAmountWan = parseFloat(document.getElementById('loanAmount').value);
    var currentPay = parseFloat(document.getElementById('currentMonthlyPay').value);
    if (isNaN(globalAmountWan) || isNaN(currentPay)) { alert('請填寫金額'); return; }
    var principal = globalAmountWan * 10000;
    var bankPay = Math.round((principal * 0.025 / 12 * Math.pow(1 + 0.025 / 12, 240)) / (Math.pow(1 + 0.025 / 12, 240) - 1));
    globalSavingsMonth = currentPay - bankPay;
    document.getElementById('resultWrapper').style.display = 'block';
    document.getElementById('bankMonthlyPay').innerText = bankPay.toLocaleString();
    document.getElementById('monthlySavings').innerText = globalSavingsMonth.toLocaleString();
}

function submitAndAction(actionType) {
    var name = document.getElementById('clientName').value.trim();
    var phone = document.getElementById('clientPhone').value.trim();
    if (!name || !phone) { alert('請填寫姓名與電話'); return; }
    
    var formAction = "https://docs.google.com/forms/d/e/1FAIpQLSea_RmGipK2d38A6NdrUhi0-gFLGhEYt16-oiYzyx0LZKhvNQ/formResponse";
    var targetForm = document.createElement("form");
    targetForm.action = formAction; targetForm.method = "POST"; targetForm.target = "silent_backdoor_frame";
    var data = {"entry.1827805292": name, "entry.486407009": phone, "entry.1713018944": currentType, "entry.1576907279": globalAmountWan + "萬", "entry.2109757796": globalSavingsMonth};
    for (var key in data) {
        var input = document.createElement("input");
        input.type = "hidden"; input.name = key; input.value = data[key];
        targetForm.appendChild(input);
    }
    document.body.appendChild(targetForm);
    targetForm.submit();
    document.body.removeChild(targetForm);
    
    if (actionType === 'LINE') { window.open("https://line.me/ti/p/QgM9HRJ4P_", '_blank'); }
    else if (actionType === 'PHONE') { window.location.href = "tel:0976555723"; }
    else { alert('資料已成功登記！'); }
}
</script>
</body>
</html>
