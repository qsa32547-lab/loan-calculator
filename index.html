<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初步試算轉貸銀行可節省金額</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 25px;
            font-size: 22px;
        }
        .tab-container {
            display: table;
            width: 100%;
            margin-bottom: 20px;
            border-bottom: 2px solid #ccc;
        }
        .tab {
            display: table-cell;
            text-align: center;
            padding: 12px;
            cursor: pointer;
            font-weight: bold;
            color: #7f8c8d;
            background-color: #f9f9f9;
            border: 1px solid #ccc;
            border-bottom: none;
            border-radius: 6px 6px 0 0;
        }
        .tab.active {
            color: #27ae60;
            background-color: #fff;
            border-bottom: 2px solid #fff;
            padding-bottom: 13px;
            margin-bottom: -2px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #34495e;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
        }
        button:hover {
            background-color: #219653;
        }
        .result-wrapper {
            display: none;
            margin-top: 25px;
        }
        .result-box {
            padding: 15px;
            border-radius: 4px;
            background-color: #e8f8f5;
            border-left: 5px solid #2cc990;
        }
        .box-title {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 10px;
            color: #2c3e50;
            border-bottom: 1px dashed #ccc;
            padding-bottom: 5px;
        }
        .result-item {
            margin-bottom: 8px;
            font-size: 15px;
        }
        .highlight {
            font-weight: bold;
            color: #e74c3c;
            font-size: 18px;
        }
        .hint-text {
            font-size: 13px;
            color: #7f8c8d;
            margin-top: 2px;
        }
        .contact-section {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px dashed #2cc990;
        }
        .contact-title {
            font-weight: bold;
            font-size: 16px;
            color: #2c3e50;
            margin-bottom: 15px;
            text-align: center;
        }
        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .input-row .form-group {
            flex: 1;
            margin-bottom: 0;
        }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #06C755;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 17px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 5px;
            text-align: center;
            box-sizing: border-box;
        }
        .submit-btn:hover {
            background-color: #05b04b;
        }
        .phone-call {
            font-size: 16px;
            font-weight: bold;
            color: #27ae60;
            text-decoration: none;
            display: inline-block;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>初步試算轉貸銀行可節省金額</h2>
    
    <div class="tab-container">
        <div class="tab active" id="tabA" onclick="switchTab('A')">民間純繳息</div>
        <div class="tab" id="tabB" onclick="switchTab('B')">融資本利攤還</div>
    </div>
    
    <div class="form-group">
        <label id="amountLabel">目前民間借款總金額 (萬元)：</label>
        <input type="number" id="loanAmount" placeholder="例如：100" min="1">
    </div>
    
    <div class="form-group">
        <label id="payLabel">目前每月只繳的民間利息 (元)：</label>
        <input type="number" id="currentMonthlyPay" placeholder="例如：20000" min="1">
        <div id="hintText" class="hint-text">＊指每個月只付利息、本金完全沒有歸還的金額</div>
    </div>
    
    <button onclick="calculateSavings()">開始進行試算</button>
    
    <!-- 結果輸出區 -->
    <div class="result-wrapper" id="resultWrapper">
        <div class="result-box">
            <div class="box-title">📊 初步試算轉貸後省下金額</div>
            <div class="result-item">銀行預估每月還款金額：<span id="bankMonthlyPay" style="font-weight: bold; color: #2c3e50;">0</span> 元</div>
            <hr style="border: 0; border-top: 1px dashed #ccc; margin: 10px 0;">
            <div class="result-item">整合後 <span id="resultTypeLabel">每月可省下</span>：<span id="monthlySavings" class="highlight">0</span> 元</div>
            <div class="result-item">整合後 每年可省下：<span id="yearlySavings" class="highlight">0</span> 元</div>
            
            <!-- 客戶資訊自動同步表單區 -->
            <div class="contact-section">
                <div class="contact-title">✨ 獲取免費諮詢與精準額度規劃 ✨</div>
                
                <div class="input-row">
                    <div class="form-group">
                        <label for="clientName">您的姓氏：</label>
                        <input type="text" id="clientName" placeholder="例如：陳先生 / 林小姐">
                    </div>
                    <div class="form-group">
                        <label for="clientPhone">聯繫電話：</label>
                        <input type="tel" id="clientPhone" placeholder="例如：0912345678">
                    </div>
                </div>
                
                <button class="submit-btn" onclick="silentSubmitToGoogle()">送出並登記初步試算資料</button>
                
                <div style="text-align: center;">
                    <a href="tel:0905357761" class="phone-call">📞 或直接來電聯絡：0905-357761</a>
                </div>
            </div>
        </div>
    </div>
</div>

<iframe name="silent_backdoor_frame" id="silent_backdoor_frame" style="display:none;"></iframe>

<script>
var currentType = 'A';
var globalSavingsMonth = 0;
var globalSavingsYear = 0;
var globalAmountWan = 0;

function switchTab(type) {
    currentType = type;
    document.getElementById('resultWrapper').style.display = 'none';
    
    if (type === 'A') {
        document.getElementById('tabA').className = 'tab active';
        document.getElementById('tabB').className = 'tab';
        document.getElementById('amountLabel').innerText = '目前民間借款總金額 (萬元)：';
        document.getElementById('payLabel').innerText = '目前每月只繳的民間利息 (元)：';
        document.getElementById('currentMonthlyPay').placeholder = '計算範例：20000';
        document.getElementById('hintText').innerText = '＊指每個月只付利息、本金完全沒有歸還的金額';
    } else {
        document.getElementById('tabA').className = 'tab';
        document.getElementById('tabB').className = 'tab active';
        document.getElementById('amountLabel').innerText = '目前融資貸款總金額 (萬元)：';
        document.getElementById('payLabel').innerText = '目前每月總付款金額 (元)：';
        document.getElementById('currentMonthlyPay').placeholder = '計算範例：25000';
        document.getElementById('hintText').innerText = '＊指每個月本金與利息一同攤還的總金額';
    }
}

function calculateSavings() {
    globalAmountWan = parseFloat(document.getElementById('loanAmount').value);
    var currentPay = parseFloat(document.getElementById('currentMonthlyPay').value);
    
    var bankYears = 20;
    var bankAnnualRate = 2.5; 
    
    if (isNaN(globalAmountWan) || isNaN(currentPay)) {
        alert('請填寫完整的試算資料喔！');
        return;
    }
    
    var principal = globalAmountWan * 10000;
    var months = bankYears * 12;
    var monthlyRate = (bankAnnualRate / 100) / 12;
    
    var bankPay = 0;
    if (monthlyRate === 0) {
        bankPay = principal / months;
    } else {
        bankPay = (principal * monthlyRate * Math.pow(1 + monthlyRate, months)) / (Math.pow(1 + monthlyRate, months) - 1);
    }
    bankPay = Math.round(bankPay);
    
    globalSavingsMonth = currentPay - bankPay;
    globalSavingsYear = globalSavingsMonth * 12;
    
    document.getElementById('resultWrapper').style.display = 'block';
    document.getElementById('bankMonthlyPay').innerText = bankPay.toLocaleString();
    
    if (currentType === 'A') {
        document.getElementById('resultTypeLabel').innerText = '每月可省下 (且銀行內含還本金)';
    } else {
        document.getElementById('resultTypeLabel').innerText = '每月負擔直接降低';
    }
    
    if (globalSavingsMonth > 0) {
        document.getElementById('monthlySavings').className = 'highlight';
        document.getElementById('monthlySavings').innerText = globalSavingsMonth.toLocaleString();
        document.getElementById('yearlySavings').innerText = globalSavingsYear.toLocaleString();
    } else {
        document.getElementById('monthlySavings').className = '';
        document.getElementById('monthlySavings').style.color = '#7f8c8d';
        document.getElementById('monthlySavings').innerText = '0 (此條件下原月付已極低)';
        document.getElementById('yearlySavings').innerText = '0';
    }
}

function silentSubmitToGoogle() {
    var name = document.getElementById('clientName').value.trim();
    var phone = document.getElementById('clientPhone').value.trim();
    
    if (!name || !phone) {
        alert('請填寫您的姓氏與聯繫電話，以便為您登記保留精準方案額度！');
        return;
    }
    
    var typeText = (currentType === 'A') ? "民間純繳息" : "融資本利攤還";
    var savingsText = "每月省 " + globalSavingsMonth.toLocaleString() + " 元 / 每年省 " + globalSavingsYear.toLocaleString() + " 元";
    
    var formAction = "https://docs.google.com/forms/d/e/1FAIpQLSea_RmGipK2d38A6NdrUhi0-gFLGhEYt16-oiYzyx0LZKhvNQ/formResponse";
    
    var targetForm = document.createElement("form");
    targetForm.action = formAction;
    targetForm.method = "POST";
    targetForm.target = "silent_backdoor_frame"; 
    
    var dataMapping = {
        "entry.1827805292": name,                        
        "entry.486407009": phone,                       
        "entry.1713018944": typeText,                   
        "entry.1576907279": globalAmountWan + " 萬",     
        "entry.2109757796": savingsText
    };
    
    for (var entryId in dataMapping) {
        if (dataMapping.hasOwnProperty(entryId)) {
            var hiddenInput = document.createElement("input");
            hiddenInput.type = "hidden";
            hiddenInput.name = entryId;
            hiddenInput.value = dataMapping[entryId];
            targetForm.appendChild(hiddenInput);
        }
    }
    
    document.body.appendChild(targetForm);
    targetForm.submit(); 
    document.body.removeChild(targetForm);
    
    alert('【資料登記成功】\n感謝您填寫資料，專員已收到您的試算需求，將會盡快與您聯繫。');
}
</script>

</body>
</html>
